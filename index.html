<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Honey Secret 甜蜜密爆餡雞蛋仔 - 門市地圖與加盟招募</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --honey-yellow: #FFC107;
            --main-black: #1F2937;
        }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: #FFFDF7;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #map { flex-grow: 1; width: 100%; z-index: 1; }

        /* 圖釘樣式 */
        .custom-marker {
            background-color: var(--honey-yellow);
            border: 3px solid var(--main-black);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        .custom-marker i { transform: rotate(45deg); color: var(--main-black); font-size: 14px; }
        .marker-soon { background-color: #E5E7EB; border: 3px dashed var(--main-black); }
        .marker-mobile { background-color: #FEF08A; }

        /* 加盟懸浮按鈕動畫 */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255, 193, 7, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); }
        }
        .join-btn {
            animation: pulse 2s infinite;
            background-color: var(--honey-yellow);
            border: 3px solid var(--main-black);
        }

        /* 彈窗樣式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #FFFDF7;
            margin: 5% auto;
            border: 4px solid var(--main-black);
            width: 90%;
            max-width: 550px;
            max-height: 85vh;
            border-radius: 20px;
            overflow-y: auto;
            position: relative;
        }

        /* 滾動條美化 */
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--honey-yellow); border-radius: 10px; }

        .leaflet-popup-content-wrapper { border: 2px solid var(--main-black); border-radius: 12px; }
    </style>
</head>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 門市資料
        const BASE_IMG = "https://760709f663.clvaw-cdnwnd.com/5183af9aa06e646df996520f487cd9b4/";
        const stores = [
            { id: 1,  name: "台中一中店", region: "中部", address: "台中市北區一中街179巷",            lat: 24.1505, lng: 120.6853, type: "open",   photo: BASE_IMG + "200000112-27bd627bd9/809287-9.jpg" },
            { id: 2,  name: "台中太平店", region: "中部", address: "台中市太平區中山路二段391號",       lat: 24.1501, lng: 120.7288, type: "open",   photo: BASE_IMG + "200000405-8e3368e339/1731268341083.jpeg" },
            { id: 3,  name: "台中流動店", region: "中部", address: "大雅雅潭夜市",                    lat: 24.2183, lng: 120.6635, type: "mobile", photo: BASE_IMG + "200000402-a3cd5a3cd7/1727455099323.jpeg" },
            { id: 4,  name: "彰化溪湖店", region: "中部", address: "溪湖糖廠",                        lat: 23.9515, lng: 120.4828, type: "open",   photo: BASE_IMG + "200000418-d09bed09c0/1768722256512.jpeg" },
            { id: 5,  name: "桃園藝文店", region: "北部", address: "桃園蔦屋書店專櫃",                lat: 25.0163, lng: 121.2988, type: "open",   photo: BASE_IMG + "200000420-071d2071d4/IMG_20260121_034527.jpeg" },
            { id: 6,  name: "桃園市集號", region: "北部", address: "桃園中正路(桃知道)",               lat: 25.0169, lng: 121.2941, type: "mobile", photo: BASE_IMG + "200000428-bdea4bdea6/IMG_20260227_141732.jpeg" },
            { id: 7,  name: "桃園龍潭店", region: "北部", address: "桃園市龍潭區神龍路235號",          lat: 24.8643, lng: 121.2165, type: "open",   photo: BASE_IMG + "200000290-4ea724ea73/801169.jpeg" },
            { id: 8,  name: "苗栗至公店", region: "北部", address: "苗栗市至公路482號",               lat: 24.5574, lng: 120.8122, type: "open",   photo: BASE_IMG + "200000412-425c5425c6/1747926432127-4.jpeg" },
            { id: 9,  name: "宜蘭宜大店", region: "北部", address: "宜蘭市女中路三段125號",            lat: 24.7461, lng: 121.7468, type: "open",   photo: BASE_IMG + "200000404-15c4d15c4e/1731268341070.jpeg" },
            { id: 10, name: "新北板橋店", region: "北部", address: "新北市板橋區",                    lat: 25.0135, lng: 121.4623, type: "open",   photo: null },
            { id: 11, name: "台南永康店", region: "南部", address: "台南市永康區中正六街215號之4",      lat: 23.0368, lng: 120.2452, type: "open",   photo: BASE_IMG + "200000414-05cac05cae/%E6%94%A4%E4%BD%8D%E7%85%A7.jpeg" },
            { id: 12, name: "高雄豐裕店", region: "南部", address: "高雄市三民區正忠路202號騎樓",      lat: 22.6456, lng: 120.3308, type: "open",   photo: "images/fengyushop.jpg" },
            { id: 13, name: "高雄市集號", region: "南部", address: "高雄仁武夜市",                    lat: 22.6933, lng: 120.3421, type: "mobile", photo: BASE_IMG + "200000426-283b7283b8/IMG_20260320_204907.jpeg" },
            { id: 14, name: "屏東市集號", region: "南部", address: "南部各大市集流動",                 lat: 22.6702, lng: 120.4851, type: "mobile", photo: "images/pingtung.jpg" },
            { id: 15, name: "桃園民有店", region: "北部", address: "桃園市桃園區民有三街537號",         lat: 25.0136, lng: 121.3135, type: "open",  photo: null },
            { id: 17, name: "新北泰山店", region: "北部", address: "新北市泰山區明志路一段366號（鮮萃茶飲）", lat: 25.0589, lng: 121.4308, type: "soon",  photo: null },
            { id: 16, name: "台中太平長億店", region: "中部", address: "台中市太平區長億北街20號",        lat: 24.1336, lng: 120.7160, type: "open",  photo: "images/changyi.jpg" }
        ];

        const map = L.map('map', { zoomControl: false }).setView([23.8, 120.9], 7);
        L.control.zoom({ position: 'bottomright' }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
        }).addTo(map);

        const createIcon = (type) => {
            let className = 'custom-marker';
            let iconClass = 'fa-store';
            if (type === 'soon') { className += ' marker-soon'; iconClass = 'fa-hammer'; }
            else if (type === 'mobile') { className += ' marker-mobile'; iconClass = 'fa-truck-fast'; }
            return L.divIcon({
                html: `<div class="${className}"><i class="fa-solid ${iconClass}"></i></div>`,
                className: '', iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -32]
            });
        };

        const markersGroup = L.featureGroup().addTo(map);

        stores.forEach(store => {
            L.marker([store.lat, store.lng], { icon: createIcon(store.type) })
                .on('click', () => openStoreModal(store))
                .addTo(markersGroup);
        });

        // 彈窗控制
        const modal = document.getElementById("joinModal");
        function openModal() { modal.style.display = "block"; }
        function closeModal() { modal.style.display = "none"; }

        const storeModal = document.getElementById("storeModal");
        function openStoreModal(store) {
            const tag = store.type === 'soon' ? '即將開幕' : (store.type === 'mobile' ? '流動市集' : '營業中');
            const img = document.getElementById("storeModalImg");
            const noImg = document.getElementById("storeModalNoImg");
            if (store.photo) {
                img.src = store.photo;
                img.style.display = "block";
                noImg.style.display = "none";
            } else if (store.type === "soon") {
                img.style.display = "none";
                noImg.style.display = "flex";
                noImg.textContent = "即將開幕，敬請期待";
            } else {
                img.style.display = "none";
                noImg.style.display = "flex";
                noImg.textContent = "暫無照片";
            }
            document.getElementById("storeModalName").textContent = store.name;
            document.getElementById("storeModalTag").textContent = tag;
            document.getElementById("storeModalAddr").textContent = store.address;
            storeModal.style.display = "block";
        }
        function closeStoreModal() { storeModal.style.display = "none"; }

        window.onclick = function(event) {
            if (event.target == modal) closeModal();
            if (event.target == storeModal) closeStoreModal();
        }
    </script>
</body>
